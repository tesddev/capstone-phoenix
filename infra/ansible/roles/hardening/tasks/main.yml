---
- name: Update apt cache
  ansible.builtin.command:
    cmd: apt-get -o DPkg::Lock::Timeout=120 update
  changed_when: false

- name: Install baseline packages
  ansible.builtin.command:
    cmd: >-
      apt-get -o DPkg::Lock::Timeout=120 install -y
      curl ca-certificates gnupg ufw fail2ban python3 python3-apt
  register: baseline_packages
  changed_when: "'0 newly installed' not in baseline_packages.stdout"

- name: Create non-root deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Allow deploy user passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Install deploy user's SSH authorized key
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ lookup('file', ssh_public_key_path) }}"
    state: present

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  notify: restart ssh

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    validate: 'sshd -t -f %s'
  notify: restart ssh

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow Kubernetes API through UFW for admin CIDR already restricted by AWS SG
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Allow all private node-to-node traffic from VPC CIDR
  community.general.ufw:
    rule: allow
    from_ip: "10.42.0.0/16"

- name: Enable UFW
  community.general.ufw:
    state: enabled
