apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: taskapp
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
